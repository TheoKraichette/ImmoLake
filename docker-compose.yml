x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.1.8}
  env_file: .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    # providers-postgres conservé tant que les DAGs importent PostgresHook (retiré en v2-4) ; duckdb = moteur de transform
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-apache-airflow-providers-amazon apache-airflow-providers-postgres pandas pyarrow requests pytest duckdb}
    AIRFLOW_CONN_MINIO_DEFAULT: 'aws://${MINIO_ROOT_USER:-minio_admin}:${MINIO_ROOT_PASSWORD:-minio_password_2026}@/?endpoint_url=http%3A%2F%2Fminio%3A9000&region_name=us-east-1'
    AIRFLOW_CONN_ADEME_API: 'http://data.ademe.fr/?__extra__=%7B%22schema%22%3A%20%22https%22%7D'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./include:/opt/airflow/include
    - ./config:/opt/airflow/config
    - ./tests:/opt/airflow/tests
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres-airflow:
      condition: service_healthy

services:
  postgres-airflow:
    image: postgres:18
    container_name: immolake-postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pg-airflow-data:/var/lib/postgresql   # PG 18+ : racine, pas /data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: immolake-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password_2026}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Crée le bucket et les zones du médaillon (raw / silver / gold)
  minio-init:
    image: minio/mc:latest
    container_name: immolake-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio_admin} ${MINIO_ROOT_PASSWORD:-minio_password_2026};
      mc mb --ignore-existing local/${MINIO_BUCKET:-immolake};
      : > /tmp/.keep;
      mc cp /tmp/.keep local/${MINIO_BUCKET:-immolake}/raw/.keep;
      mc cp /tmp/.keep local/${MINIO_BUCKET:-immolake}/silver/.keep;
      mc cp /tmp/.keep local/${MINIO_BUCKET:-immolake}/gold/.keep;
      "

  # Migrations + création de l'utilisateur admin
  airflow-init:
    <<: *airflow-common
    container_name: immolake-airflow-init
    entrypoint: /entrypoint
    command:
      - bash
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        airflow db migrate
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME:-airflow}" \
          --password "${_AIRFLOW_WWW_USER_PASSWORD:-airflow}" \
          --firstname Admin --lastname Immo --role Admin --email admin@immolake.local || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}

  airflow-apiserver:
    <<: *airflow-common
    container_name: immolake-airflow-apiserver
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: immolake-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    container_name: immolake-airflow-dag-processor
    command: dag-processor
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: immolake-airflow-triggerer
    command: triggerer
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # Front sur-mesure : DuckDB lit le gold/ref Parquet dans MinIO (remplace Metabase)
  streamlit:
    image: python:3.12-slim
    container_name: immolake-streamlit
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             streamlit run app.py --server.address=0.0.0.0 --server.port=8501"
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ./streamlit_app:/app
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-airflow-data:
  minio-data:
  airflow-logs:
